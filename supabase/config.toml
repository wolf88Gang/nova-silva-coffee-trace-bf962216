# Configuración para Edge Functions
# ensure-demo-user: debe ser invocable sin sesión (usuario anónimo en /demo)
[functions.ensure-demo-user]
verify_jwt = false

# rls-smoke-test: requiere JWT del caller para probar RLS (403 reales)
[functions.rls-smoke-test]
verify_jwt = true

# ng-impact-recompute: service_role, corre programada o manual
[functions.ng-impact-recompute]
verify_jwt = false

# agro-alert-evaluator: service_role, corre programada o manual
[functions.agro-alert-evaluator]
verify_jwt = false

# log-nutrition-execution-v1: requiere JWT, registra ejecución de fertilización
[functions.log-nutrition-execution-v1]
verify_jwt = true

# approve-nutrition-plan-v1: requiere JWT + rol tecnico/admin_org
[functions.approve-nutrition-plan-v1]
verify_jwt = true

# revise-nutrition-plan-v1: requiere JWT + rol tecnico/admin_org
[functions.revise-nutrition-plan-v1]
verify_jwt = true

# quote-nutrition-inputs-v1: requiere JWT, sugiere proveedores o genera cotización
[functions.quote-nutrition-inputs-v1]
verify_jwt = true

# paypal-proxy: requiere usuario autenticado (session.access_token). No acepta anon key.
[functions.paypal-proxy]
verify_jwt = true
